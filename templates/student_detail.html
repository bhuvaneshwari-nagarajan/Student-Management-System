{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h3>{{ student.name }}</h3>
        <p><strong>Student ID:</strong> {{ student.student_id }}</p>
        <p><strong>Email:</strong> {{ student.email }}</p>
        <p><strong>Phone:</strong> {{ student.phone }}</p>
        <p><strong>Address:</strong> {{ student.address }}</p>
        {% if student.image %}
            <img src="{{ student.image.url }}" class="img-fluid mb-3" width="240" alt="Student image">
        {% else %}
            <p>No image uploaded.</p>
        {% endif %}
        <a class="btn btn-primary" href="{% url 'students:student_update' student.pk %}">Edit</a>
        <a class="btn btn-outline-danger" href="{% url 'students:student_delete' student.pk %}">Delete</a>
    </div>
</div>
{% endblock %}
