<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">StudentManagement</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active bg-white text-primary rounded{% endif %}" href="{% url 'home' %}">Home</a>
                </li>
                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/dashboard/' %}active bg-white text-primary rounded{% endif %}" href="{% url 'dashboard' %}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/students/' in request.path %}active bg-white text-primary rounded{% endif %}" href="{% url 'students:student_list' %}">Students</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/courses/' in request.path %}active bg-white text-primary rounded{% endif %}" href="{% url 'courses:course_list' %}">Courses</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/enrollments/' in request.path %}active bg-white text-primary rounded{% endif %}" href="{% url 'enrollments:enrollment_list' %}">Enrollments</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/accounts/profile/' in request.path %}active bg-white text-primary rounded{% endif %}" href="{% url 'accounts:profile' %}">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'accounts:logout' %}">Logout</a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link {% if '/accounts/login/' in request.path %}active bg-white text-primary rounded{% endif %}" href="{% url 'accounts:login' %}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/accounts/register/' in request.path %}active bg-white text-primary rounded{% endif %}" href="{% url 'accounts:register' %}">Register</a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
