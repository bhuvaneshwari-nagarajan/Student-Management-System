{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h3>Delete Course</h3>
        <p>Are you sure you want to delete {{ object.course_name }}?</p>
        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger" type="submit">Confirm Delete</button>
            <a class="btn btn-secondary" href="{% url 'courses:course_list' %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
